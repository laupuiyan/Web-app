<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#232F3E">
<title>AIF-C01 Practice</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF9900;--orange-d:#D68910;--dark:#232F3E;--dark2:#16202C;
  --bg:#F0F2F5;--white:#FFFFFF;--border:#E0E4EA;
  --text:#1A202C;--muted:#718096;
  --green:#16A34A;--green-l:#F0FDF4;--green-b:#BBF7D0;
  --red:#DC2626;--red-l:#FEF2F2;--red-b:#FECACA;
  --blue:#2563EB;--blue-l:#EFF6FF;
  --yellow:#F59E0B;--yellow-l:#FFFBEB;
  --nav:64px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{max-width:500px;margin:0 auto;height:100vh;height:-webkit-fill-available;background:var(--bg);position:relative;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:500px){body{background:#D0D3D9}#app{box-shadow:0 0 40px rgba(0,0,0,.15)}}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;
  height:calc(var(--nav) + var(--safe-b));padding-bottom:var(--safe-b);
  background:var(--white);border-top:1px solid var(--border);
  display:flex;align-items:stretch;z-index:200;backdrop-filter:blur(10px)}
.bnav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:500;
  cursor:pointer;transition:color .15s;padding-bottom:2px}
.bnav-tab.on{color:var(--orange)}
.bnav-tab svg{width:22px;height:22px}

/* ── PAGES ── */
.page{display:none;flex-direction:column;
  min-height:calc(100vh - var(--nav) - var(--safe-b));
  padding-bottom:calc(var(--nav) + var(--safe-b) + 8px)}
.page.on{display:flex}

/* ── HEADERS ── */
.hdr{background:var(--dark);color:#fff;
  padding:calc(14px + var(--safe-t)) 18px 14px;
  flex-shrink:0;z-index:100}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.hdr .sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}

.qhdr{background:var(--dark);color:#fff;
  padding:calc(12px + var(--safe-t)) 14px 0;
  flex-shrink:0;z-index:100}
.qhdr-row{display:flex;align-items:center;gap:10px;padding-bottom:12px}
.back-btn{width:36px;height:36px;border:none;background:rgba(255,255,255,.12);
  color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;font-size:18px}
.qhdr-info{flex:1}
.qhdr-num{font-size:14px;font-weight:600}
.qhdr-pos{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
.bkmk-btn{width:36px;height:36px;border:none;background:transparent;
  color:rgba(255,255,255,.4);border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0;transition:color .2s}
.bkmk-btn.on{color:var(--yellow)}
.qpbar{height:3px;background:rgba(255,255,255,.15)}
.qpbar-fill{height:100%;background:var(--orange);transition:width .3s ease}

/* ── FILTER PILLS ── */
.pills{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;
  -ms-overflow-style:none;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.pills::-webkit-scrollbar{display:none}
.pill{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:transparent;color:var(--muted);font-size:13px;font-weight:500;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.pill.on{background:var(--dark);border-color:var(--dark);color:#fff}
.pill-count{font-size:10px;margin-left:3px;opacity:.7}

/* ── START QUIZ BUTTON ── */
.start-btn{margin:12px 14px 4px;padding:14px;background:var(--orange);color:#fff;
  border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;
  text-align:center;box-shadow:0 4px 14px rgba(255,153,0,.35);transition:background .15s;flex-shrink:0}
.start-btn:active{background:var(--orange-d)}

/* ── QUESTION LIST ── */
.qlist{padding:10px 14px;padding-bottom:calc(10px + var(--nav) + var(--safe-b));display:flex;flex-direction:column;gap:8px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.qitem{background:var(--white);border-radius:12px;padding:13px 14px;
  display:flex;align-items:flex-start;gap:11px;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.07);border:1.5px solid transparent;
  transition:transform .1s,box-shadow .1s}
.qitem:active{transform:scale(.985);box-shadow:none}
.qitem.correct{border-color:var(--green)}
.qitem.wrong{border-color:var(--red)}
.qitem.bookmarked-item{border-color:var(--yellow)}
.qstat{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.qstat.u{background:var(--bg);color:var(--muted);border:1.5px solid var(--border)}
.qstat.c{background:var(--green-l);color:var(--green)}
.qstat.w{background:var(--red-l);color:var(--red)}
.qbody{flex:1;min-width:0}
.qnum{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.qpreview{font-size:14px;color:var(--text);line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.qright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.bicon{font-size:18px;color:var(--border);transition:color .2s}
.bicon.on{color:var(--yellow)}
.qbadge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.qbadge.c{background:var(--green-l);color:var(--green)}
.qbadge.w{background:var(--red-l);color:var(--red)}

/* ── EMPTY STATE ── */
.empty{padding:44px 20px;text-align:center}
.empty-icon{font-size:52px;margin-bottom:12px}
.empty h3{font-size:16px;font-weight:600;margin-bottom:6px}
.empty p{font-size:13px;color:var(--muted);line-height:1.5}

/* ── QUESTION VIEW ── */
.qview-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.qview-body{padding:18px 14px 16px}

.qtext-card{background:var(--white);border-radius:12px;padding:16px;
  font-size:15px;line-height:1.65;color:var(--text);margin-bottom:18px;
  box-shadow:0 1px 3px rgba(0,0,0,.07);white-space:pre-wrap}

.result-banner{display:flex;align-items:center;gap:8px;padding:11px 14px;
  border-radius:10px;margin-bottom:16px;font-size:14px;font-weight:600}
.result-banner.c{background:var(--green-l);color:var(--green);border:1.5px solid var(--green-b)}
.result-banner.w{background:var(--red-l);color:var(--red);border:1.5px solid var(--red-b)}
.result-banner.r{background:var(--red-l);color:var(--red);border:1.5px solid var(--red-b)}
.result-banner svg{width:18px;height:18px;flex-shrink:0}

/* ── OPTIONS ── */
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.opt{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;
  background:var(--white);border:2px solid var(--border);border-radius:12px;
  cursor:pointer;text-align:left;color:var(--text);font-size:14px;line-height:1.5;
  transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06);width:100%}
.opt:not([disabled]):active{transform:scale(.98)}
.opt[disabled]{cursor:default}
.olabel{width:28px;height:28px;border-radius:50%;background:var(--bg);border:2px solid var(--border);
  color:var(--muted);font-size:12px;font-weight:700;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:all .15s}
.otext{flex:1;padding-top:3px}

/* Option states */
.opt.sel-c{border-color:var(--green);background:var(--green-l)}
.opt.sel-c .olabel{background:var(--green);border-color:var(--green);color:#fff}
.opt.sel-w{border-color:var(--red);background:var(--red-l)}
.opt.sel-w .olabel{background:var(--red);border-color:var(--red);color:#fff}
.opt.show-c{border-color:var(--green);background:var(--green-l)}
.opt.show-c .olabel{background:var(--green);border-color:var(--green);color:#fff}
.opt.dim{opacity:.38}
/* Multi-select pending (chosen but not yet submitted) */
.opt.sel-pending{border-color:var(--blue);background:var(--blue-l)}
.opt.sel-pending .olabel{background:var(--blue);border-color:var(--blue);color:#fff}
/* Multi-answer hint banner */
.multi-hint{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;
  background:var(--blue-l);color:var(--blue);border-radius:8px;
  font-size:12px;font-weight:600;margin-bottom:14px;border:1px solid #BFDBFE}
.multi-hint svg{flex-shrink:0}
/* Submit answer button (multi-answer) */
.submit-ans-wrap{margin-bottom:18px}
.submit-ans-btn{width:100%;padding:14px;background:var(--dark);border:none;
  color:#fff;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;
  transition:all .15s;box-shadow:0 4px 14px rgba(35,47,62,.2)}
.submit-ans-btn:not(.disabled-btn):active{opacity:.8}
.submit-ans-btn.disabled-btn{background:var(--border);color:var(--muted);
  box-shadow:none;cursor:default}
/* Retry button (shown on wrong-answer result) */
.retry-btn{width:100%;padding:12px 16px;background:transparent;
  border:2px solid var(--orange);color:var(--orange);border-radius:12px;
  font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px;transition:all .15s}
.retry-btn:active{background:var(--yellow-l)}
/* Retry mode badge in question header */
.retry-badge{display:inline-block;font-size:10px;font-weight:700;
  background:var(--yellow-l);color:#D97706;border-radius:4px;
  padding:2px 6px;vertical-align:middle;margin-left:6px;border:1px solid #FDE68A}

/* ── EXPLANATION ── */
.expl-wrap{margin-bottom:18px}
.expl-btn{width:100%;padding:12px 16px;background:var(--blue-l);border:1.5px solid var(--blue);
  border-radius:10px;color:var(--blue);font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.expl-btn:active{background:#DBEAFE}
.expl-body{background:var(--white);border:1.5px solid var(--border);border-top:none;
  border-radius:0 0 10px 10px;padding:15px;font-size:13.5px;line-height:1.72;
  color:var(--text);display:none;white-space:pre-wrap}
.expl-body.on{display:block}

/* Correct answer label */
.ca-tag{display:inline-flex;align-items:center;gap:4px;margin-left:8px;
  font-size:10px;font-weight:700;color:var(--green);background:var(--green-l);
  padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;vertical-align:middle}

/* ── NAV BUTTONS ── */
.qnav{display:flex;gap:10px;padding:12px 14px calc(12px + var(--nav) + var(--safe-b));
  background:var(--white);border-top:1px solid var(--border);
  flex-shrink:0;z-index:50}
.qnav-btn{flex:1;padding:13px;border-radius:10px;border:2px solid var(--border);
  background:var(--white);color:var(--text);font-size:14px;font-weight:600;
  cursor:pointer;transition:all .15s}
.qnav-btn:active{opacity:.7}
.qnav-btn:disabled{opacity:.3;cursor:default}
.qnav-btn.pri{background:var(--dark);border-color:var(--dark);color:#fff}

/* ── DASHBOARD ── */
.dash-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.dash-body{padding:14px;padding-bottom:calc(14px + var(--nav) + var(--safe-b))}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.scard{background:var(--white);border-radius:12px;padding:15px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.scard.hl{background:var(--dark)}
.sval{font-size:28px;font-weight:700;line-height:1}
.scard.hl .sval{color:var(--orange)}
.slabel{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
.scard.hl .slabel{color:rgba(255,255,255,.5)}

.section{background:var(--white);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.section-ttl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-legend{display:flex;flex-direction:column;gap:10px;flex:1}
.leg-item{display:flex;align-items:center;gap:8px;font-size:13px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-name{color:var(--muted)}
.leg-val{font-weight:600;margin-left:auto}

/* Progress bars */
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-lbl{font-size:12px;color:var(--muted);width:80px;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .7s ease}
.bar-pct{font-size:12px;font-weight:600;width:34px;text-align:right;flex-shrink:0}

/* Wrong review items */
.review-item{background:var(--white);border-radius:10px;padding:12px 13px;
  margin-bottom:8px;border-left:3px solid var(--red);cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.06)}
.review-item:active{opacity:.7}
.rnum{font-size:11px;font-weight:600;color:var(--red);margin-bottom:3px}
.rtext{font-size:13px;color:var(--text);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-ttl{font-size:15px;font-weight:700}
.sec-more{font-size:13px;color:var(--blue);cursor:pointer}

/* Reset button */
.reset-btn{width:100%;padding:14px;border:2px solid var(--red);background:transparent;
  color:var(--red);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.reset-btn:active{background:var(--red-l)}

/* Animations */
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.anim{animation:slideUp .22s ease}

/* Streak badge */
.streak-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
  background:var(--yellow-l);color:var(--yellow);border-radius:20px;
  font-size:12px;font-weight:600;border:1.5px solid #FDE68A}

/* ── SPLASH / CSV LOADER ── */
.splash{display:flex;align-items:center;justify-content:center;flex-direction:column;
  height:100vh;height:-webkit-fill-available;background:var(--dark);padding:20px}
.splash-card{background:var(--white);border-radius:20px;padding:36px 24px;
  width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.splash-icon{font-size:46px;line-height:1;margin-bottom:10px}
.splash-title{font-size:30px;font-weight:800;color:var(--dark);letter-spacing:-1px;margin-bottom:4px}
.splash-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:20px}
.splash-div{height:1px;background:var(--border);margin-bottom:20px}
.splash-hint{font-size:14px;color:var(--text);margin-bottom:16px;line-height:1.6}
.csv-label{display:block;padding:14px;background:var(--orange);color:#fff;
  border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;
  box-shadow:0 4px 14px rgba(255,153,0,.35);margin-bottom:16px;transition:background .15s}
.csv-label:active{background:var(--orange-d)}
.csv-label input{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
.splash-cmd{font-size:11px;color:var(--muted);line-height:1.8}
.splash-cmd code{display:inline-block;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:4px 8px;font-family:monospace;font-size:11px;color:var(--dark);
  margin-top:4px;word-break:break-all}
.splash-skip{margin-top:14px;font-size:12px;color:var(--muted)}
.splash-skip a{color:var(--blue);cursor:pointer;text-decoration:none}
/* Load CSV row in dashboard */
.load-csv-row{display:flex;align-items:center;gap:10px;padding:13px 14px;
  background:var(--white);border-radius:12px;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:10px;
  border:1.5px dashed var(--border);transition:border-color .15s}
.load-csv-row:active{border-color:var(--orange)}
.load-csv-row input{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
.load-csv-icon{font-size:22px;flex-shrink:0}
.load-csv-info{flex:1}
.load-csv-title{font-size:13px;font-weight:600;color:var(--text)}
.load-csv-sub{font-size:11px;color:var(--muted);margin-top:1px}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

/* ════════════════════════════════════════════
   QUESTIONS DATA  (26 built-in demo questions)
   Overwritten at runtime when questions.csv is loaded
════════════════════════════════════════════ */
let Q = [
{
  id:1,
  q:"A company makes forecasts each quarter to decide how to optimize operations to meet expected demand. The company uses ML models to make these forecasts.\n\nAn AI practitioner is writing a report about the trained ML models to provide transparency and explainability to company stakeholders.\n\nWhat should the AI practitioner include in the report to meet the transparency and explainability requirements?",
  opts:["Code for model training","Partial dependence plots (PDPs)","Sample data for training","Model convergence tables"],
  ans:1,
  expl:"Correct Answer: B — Partial dependence plots (PDPs)\n\nPDPs show the relationship between one or more features and the model's predicted output, allowing stakeholders to see exactly how each variable influences predictions. This directly meets transparency and explainability requirements.\n\n• A. Code for model training — Technical code does not help non-technical stakeholders understand model behavior.\n• C. Sample data for training — Shows what data was used, but not how the model uses it.\n• D. Model convergence tables — These are optimization metrics for engineers, not explainability tools."
},
{
  id:2,
  q:"A law firm wants to build an AI application by using large language models (LLMs). The application will read legal documents and extract key points from the documents.\n\nWhich solution meets these requirements?",
  opts:["Build an automatic named entity recognition system.","Create a recommendation engine.","Develop a summarization chatbot.","Develop a multi-language translation system."],
  ans:2,
  expl:"Correct Answer: C — Develop a summarization chatbot\n\nA summarization chatbot powered by an LLM can read long legal documents and generate concise summaries that highlight key points. This is exactly what the law firm needs.\n\n• A. Named entity recognition (NER) — Identifies named entities (people, places, dates) but does not extract key conceptual points.\n• B. Recommendation engine — Suggests items based on preferences; not relevant to document summarization.\n• D. Translation system — Converts language; does not extract or summarize legal content."
},
{
  id:3,
  q:"A company wants to classify human genes into 20 categories based on gene characteristics. The company needs an ML algorithm to document how the inner mechanism of the model affects the output.\n\nWhich ML algorithm meets these requirements?",
  opts:["Decision trees","Linear regression","Logistic regression","Neural networks"],
  ans:0,
  expl:"Correct Answer: A — Decision trees\n\nDecision trees are inherently interpretable. Each node, branch, and split rule can be documented and explained, making it easy to show how the model's inner mechanism (specific feature thresholds) leads to each of the 20 classification outcomes.\n\n• B. Linear regression — Predicts continuous values, not suitable for 20-category classification.\n• C. Logistic regression — Works best for binary classification; extending to 20 classes is complex and less interpretable.\n• D. Neural networks — Highly accurate but considered a 'black box'; the inner mechanism is very difficult to document or explain."
},
{
  id:4,
  q:"A company has built an image classification model to predict plant diseases from photos of plant leaves. The company wants to evaluate how many images the model classified correctly.\n\nWhich evaluation metric should the company use to measure the model's performance?",
  opts:["R-squared score","Accuracy","Root mean squared error (RMSE)","Learning rate"],
  ans:1,
  expl:"Correct Answer: B — Accuracy\n\nAccuracy measures the proportion of correctly classified images out of the total number of images. It directly answers the question of how many images the model got right.\n\n• A. R-squared score — Used for regression tasks (continuous output), not classification.\n• C. RMSE (Root Mean Squared Error) — Also used for regression, not classification.\n• D. Learning rate — A hyperparameter used during model training, not an evaluation metric for already-trained models."
},
{
  id:5,
  q:"A company is using a pre-trained large language model (LLM) to build a chatbot for product recommendations. The company needs the LLM outputs to be short and written in a specific language.\n\nWhich solution will align the LLM response quality with the company's expectations?",
  opts:["Adjust the prompt.","Choose an LLM of a different size.","Increase the temperature.","Increase the Top K value."],
  ans:0,
  expl:"Correct Answer: A — Adjust the prompt\n\nPrompt engineering allows you to directly instruct the LLM on the desired output format, length, and language (e.g., 'Respond in Spanish in 2 sentences or fewer'). This is the most direct and cost-effective way to control output behavior.\n\n• B. Different LLM size — Model size affects capability and cost, but doesn't specifically control output length or language.\n• C. Increase temperature — Makes outputs more random/creative, which would make them less predictable and potentially longer.\n• D. Increase Top K — Affects the vocabulary sampling pool; does not control length or language."
},
{
  id:6,
  q:"A company uses Amazon SageMaker for its ML pipeline in a production environment. The company has large input data sizes up to 1 GB and processing times up to 1 hour. The company needs near real-time latency.\n\nWhich SageMaker inference option meets these requirements?",

   STATE
════════════════════════════════════════════ */
const SK = 'aif_c01_v2';

function loadState(){
  try{
    const s=localStorage.getItem(SK);
    if(s) return JSON.parse(s);
  }catch(e){}
  return {answers:{},bookmarks:[],history:[]};
}

let S=loadState();
if(!S.retrying) S.retrying=[];  // backwards-compat for existing saved sessions

function save(){
  try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
}

/* UI state */
let tab='practice';      // 'practice'|'bookmarks'|'dashboard'
let view='list';         // 'list'|'question'
let filter='all';        // 'all'|'unanswered'|'correct'|'wrong'
let bkmFilter='all';     // bookmark tab sub-filter: 'all'|'correct'|'wrong'
let qList=[];            // IDs in current quiz context
let qIdx=0;              // index in qList
let explOpen=false;
let pendingMulti=[];     // selected option indices for multi-answer (pre-submit)
let justAnswered=false;  // true for exactly one render after answerQ fires
let viewSource='practice'; // 'practice'|'bookmarks' — which tab opened the question

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function getQ(id){
  const q=Q.find(q=>q.id===id);
  // Normalise ans to always be an array of numbers (handles legacy number,
  // comma-string from CSV, and already-array from parsed CSV).
  if(q&&!Array.isArray(q.ans)){
    q.ans=typeof q.ans==='string'?q.ans.split(',').map(Number):[Number(q.ans)];
  }
  return q;
}
function status(id){
  if(S.retrying.includes(id)) return 'r';  // was wrong, currently retrying
  if(!S.answers.hasOwnProperty(id)) return 'u';
  const q=getQ(id);
  const correct=[...q.ans].sort().join(',');
  const raw=S.answers[id];
  const given=(Array.isArray(raw)?[...raw]:[raw]).map(Number).sort().join(',');
  return correct===given?'c':'w';
}
function isBkm(id){return S.bookmarks.includes(id);}

function filtered(f){
  switch(f){
    case 'unanswered': return Q.filter(q=>!S.answers.hasOwnProperty(q.id)&&!S.retrying.includes(q.id)).map(q=>q.id);
    case 'correct':    return Q.filter(q=>status(q.id)==='c').map(q=>q.id);
    case 'wrong':      return Q.filter(q=>{const s=status(q.id);return s==='w'||s==='r';}).map(q=>q.id);
    case 'bookmarked': return Q.filter(q=>isBkm(q.id)).map(q=>q.id);
    default:           return Q.map(q=>q.id);
  }
}
function filteredBookmarks(f){
  const bkm=Q.filter(q=>isBkm(q.id));
  switch(f){
    case 'correct': return bkm.filter(q=>status(q.id)==='c').map(q=>q.id);
    case 'wrong':   return bkm.filter(q=>{const s=status(q.id);return s==='w'||s==='r';}).map(q=>q.id);
    default:        return bkm.map(q=>q.id);
  }
}
function countBkmLabel(f){
  const n=filteredBookmarks(f).length;
  return n>0?`<span class="pill-count">${n}</span>`:'';
}

function countLabel(f){
  const n=filtered(f).length;
  return n>0?`<span class="pill-count">${n}</span>`:'';
}

/* ════════════════════════════════════════════

════════════════════════════════════════════ */
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';

  if(view==='question'){
    renderQuestionView(app);
  } else if(tab==='dashboard'){
    renderDashboard(app);
  } else {
    renderListView(app);
  }
  renderNav(app);
  // scroll top
  setTimeout(()=>{
    const sc=app.querySelector('.qview-scroll,.qlist,.dash-scroll');
    if(sc) sc.scrollTop=0;
  },0);
}

function renderNav(app){
  const tabDef=[
    {id:'practice',label:'Practice',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1" ry="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>`},
    {id:'bookmarks',label:'Bookmarks',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>`},
    {id:'dashboard',label:'Dashboard',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`}
  ];
  const nav=el('nav','bnav');
  tabDef.forEach(t=>{
    const btn=el('button',`bnav-tab${(tab===t.id&&view!=='question')?' on':''}`);
    btn.innerHTML=t.icon+`<span>${t.label}</span>`;
    btn.addEventListener('click',()=>{
      tab=t.id;
      view='list';
      filter=t.id==='bookmarks'?'bookmarked':'all';
      if(t.id==='bookmarks') bkmFilter='all';
      explOpen=false;
      render();
    });
    nav.appendChild(btn);
  });
  app.appendChild(nav);
}

/* ── LIST VIEW ── */
function renderListView(app){
  const isBookTab=tab==='bookmarks';
  const ids=isBookTab?filteredBookmarks(bkmFilter):filtered(filter);

  // Header
  const hdr=el('div','hdr');
  const totalBkm=Q.filter(q=>isBkm(q.id)).length;
  hdr.innerHTML=isBookTab
    ?`<h1>★ Bookmarks</h1><div class="sub">${totalBkm} question${totalBkm!==1?'s':''} bookmarked</div>`
    :`<h1>AIF-C01 Practice</h1><div class="sub">AWS Certified AI Practitioner · ${Q.length} Questions</div>`;
  app.appendChild(hdr);

  // Filter pills
  if(!isBookTab){
    const pills=el('div','pills');
    [
      {id:'all',label:'All'},
      {id:'unanswered',label:'Unanswered'},
      {id:'correct',label:'Correct'},
      {id:'wrong',label:'Wrong'},
    ].forEach(p=>{
      const btn=el('button',`pill${filter===p.id?' on':''}`);
      btn.innerHTML=p.label+countLabel(p.id);
      btn.addEventListener('click',()=>{filter=p.id;render();});
      pills.appendChild(btn);
    });
    app.appendChild(pills);
  } else {
    const pills=el('div','pills');
    [
      {id:'all',   label:'All'},
      {id:'correct',label:'Correct'},
      {id:'wrong',  label:'Wrong'},
    ].forEach(p=>{
      const btn=el('button',`pill${bkmFilter===p.id?' on':''}`);
      btn.innerHTML=p.label+countBkmLabel(p.id);
      btn.addEventListener('click',()=>{bkmFilter=p.id;render();});
      pills.appendChild(btn);
    });
    app.appendChild(pills);
  }

  // Start quiz button
  if(ids.length>0){
    const startBtn=el('button','start-btn');
    startBtn.textContent=`▶  Start Quiz (${ids.length})`;
    startBtn.addEventListener('click',()=>goToQuestion(ids[0],ids,tab==='bookmarks'));
    app.appendChild(startBtn);
  }

  // Question list
  const list=el('div','qlist');

  if(ids.length===0){
    const empty=el('div','empty');
    empty.innerHTML=isBookTab
      ?`<div class="empty-icon">🔖</div><h3>No questions here</h3><p>${totalBkm===0?'Tap the ☆ icon on any question to bookmark it for later review.':'Change the filter above to see more bookmarked questions.'}</p>`
      :`<div class="empty-icon">🎉</div><h3>No questions here</h3><p>Change the filter above to see more questions.</p>`;
    list.appendChild(empty);
  } else {
    ids.forEach(id=>{
      const q=getQ(id);
      const st=status(id);
      const bkm=isBkm(id);
      const item=el('div',`qitem${st==='c'?' correct':(st==='w'||st==='r')?' wrong':''}${bkm?' bookmarked-item':''}`);

      const statusIcon=el('div','qstat '+(st==='r'?'w':st));
      statusIcon.textContent=st==='c'?'✓':(st==='w'||st==='r')?'✗':q.id;

      const body=el('div','qbody');
      body.innerHTML=`<div class="qnum">Question ${q.id}</div><div class="qpreview">${escHtml(q.q)}</div>`;

      const right=el('div','qright');
      const bkmIcon=el('span',`bicon${bkm?' on':''}`);
      bkmIcon.textContent=bkm?'★':'☆';
      bkmIcon.title='Toggle bookmark';
      bkmIcon.addEventListener('click',e=>{e.stopPropagation();toggleBkm(id);});
      right.appendChild(bkmIcon);

      if(st!=='u'){
        const badge=el('span','qbadge '+(st==='c'?'c':'w'));
        badge.textContent=st==='c'?'Correct':'Wrong';
        right.appendChild(badge);
      }

      item.appendChild(statusIcon);
      item.appendChild(body);
      item.appendChild(right);
      item.addEventListener('click',()=>goToQuestion(id,ids,tab==='bookmarks'));
      list.appendChild(item);
    });
  }
  app.appendChild(list);
}

/* ── QUESTION VIEW ── */
function renderQuestionView(app){
  const id=qList[qIdx];
  const q=getQ(id);
  const st=status(id);

  // Consume justAnswered for this render cycle.
  const freshlyAnswered=justAnswered;
  justAnswered=false;

  // In bookmark mode: treat every question as unanswered on entry so the
  // user can redo it. After they answer (freshlyAnswered), show the result.
  const bkm=isBkm(id);
  const answered=(viewSource==='bookmarks' && !freshlyAnswered)
    ? false
    : S.answers.hasOwnProperty(id);
  const userAns=S.answers[id];

  // Header
  const hdr=el('div','qhdr');
  const row=el('div','qhdr-row');

  const backBtn=el('button','back-btn');
  backBtn.innerHTML='←';
  backBtn.addEventListener('click',()=>{view='list';explOpen=false;pendingMulti=[];render();});

  const info=el('div','qhdr-info');
  const isRetrying=S.retrying.includes(id);
  info.innerHTML=`<div class="qhdr-num">Question ${q.id}${isRetrying?' <span class="retry-badge">↺ Retry</span>':''}</div><div class="qhdr-pos">${qIdx+1} / ${qList.length} in this session</div>`;

  const bkmBtn=el('button',`bkmk-btn${bkm?' on':''}`);
  bkmBtn.innerHTML=bkm?'★':'☆';
  bkmBtn.title='Toggle bookmark';
  bkmBtn.addEventListener('click',()=>{toggleBkm(id);});

  row.appendChild(backBtn);
  row.appendChild(info);
  row.appendChild(bkmBtn);
  hdr.appendChild(row);

  // Progress bar
  const pbar=el('div','qpbar');
  const pfill=el('div','qpbar-fill');
  pfill.style.width=((qIdx+1)/qList.length*100)+'%';
  pbar.appendChild(pfill);
  hdr.appendChild(pbar);

  app.appendChild(hdr);

  // Scrollable content
  const scroll=el('div','qview-scroll');
  const body=el('div','qview-body anim');

  // Result banner (after answering)
  if(answered){
    const banner=el('div',`result-banner ${st}`);
    if(st==='c'){
      banner.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Correct! Well done.`;
    } else {
      const correctLetters=q.ans.map(i=>String.fromCharCode(65+i)).join(', ');
      banner.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Incorrect. Correct answer${q.ans.length>1?'s':''}: <strong>&nbsp;${correctLetters}</strong>`;
    }
    body.appendChild(banner);
  }

  // Question text
  const qtext=el('div','qtext-card');
  qtext.textContent=q.q;
  body.appendChild(qtext);

  // Multi-answer detection + hint
  const isMulti=q.ans.length>1;
  if(isMulti&&!answered){
    const hint=el('div','multi-hint');
    hint.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="9 11 12 14 22 4"/></svg> Select ${q.ans.length} answers`;
    body.appendChild(hint);
  }

  // Options
  const opts=el('div','opts');
  const userAnsArr=answered?(Array.isArray(S.answers[id])?S.answers[id].map(Number):[Number(S.answers[id])]):[];

  q.opts.forEach((opt,i)=>{
    if(!opt) return; // skip empty option slots
    const letter=String.fromCharCode(65+i);
    const btn=el('button','opt');

    if(answered){
      btn.disabled=true;
      const isCorrect=q.ans.includes(i);
      const wasSelected=userAnsArr.includes(i);
      if(isCorrect&&wasSelected) btn.classList.add('sel-c');
      else if(!isCorrect&&wasSelected) btn.classList.add('sel-w');
      else if(isCorrect) btn.classList.add('show-c');
      else btn.classList.add('dim');
    } else if(isMulti){
      if(pendingMulti.includes(i)) btn.classList.add('sel-pending');
      btn.addEventListener('click',()=>{
        pendingMulti=pendingMulti.includes(i)?pendingMulti.filter(x=>x!==i):[...pendingMulti,i];
        render();
      });
    } else {
      btn.addEventListener('click',()=>answerQ(id,[i]));
    }

    const lbl=el('span','olabel');
    lbl.textContent=letter;
    const txt=el('span','otext');
    txt.textContent=opt;
    btn.appendChild(lbl);
    btn.appendChild(txt);

    if(answered&&q.ans.includes(i)){
      const tag=el('span','ca-tag');
      tag.textContent='✓ Answer';
      txt.appendChild(document.createTextNode(' '));
      txt.appendChild(tag);
    }

    opts.appendChild(btn);
  });

  // Submit button for multi-answer (shown before answering)
  if(isMulti&&!answered){
    const submitWrap=el('div','submit-ans-wrap');
    const submitBtn=el('button',`submit-ans-btn${pendingMulti.length===0?' disabled-btn':''}`);
    submitBtn.disabled=pendingMulti.length===0;
    submitBtn.textContent=pendingMulti.length===0
      ?`Submit Answer (select ${q.ans.length})`
      :`Submit — ${pendingMulti.length} / ${q.ans.length} selected`;
    submitBtn.addEventListener('click',()=>{if(pendingMulti.length>0)answerQ(id,[...pendingMulti]);});
    submitWrap.appendChild(submitBtn);
    body.appendChild(submitWrap);
  }

  // Explanation (only after answering)
  if(answered){
    const wrap=el('div','expl-wrap');
    const toggle=el('button','expl-btn');
    toggle.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/></svg> ${explOpen?'Hide':'Show'} Explanation`;

    const expl=el('div',`expl-body${explOpen?' on':''}`);
    expl.textContent=q.expl;

    toggle.addEventListener('click',()=>{
      explOpen=!explOpen;
      expl.classList.toggle('on');
      toggle.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/></svg> ${explOpen?'Hide':'Show'} Explanation`;
      if(explOpen) expl.scrollIntoView({behavior:'smooth',block:'nearest'});
    });

    wrap.appendChild(toggle);
    wrap.appendChild(expl);
    body.appendChild(wrap);
  }

  scroll.appendChild(body);
  app.appendChild(scroll);

  // Nav buttons
  const qnav=el('div','qnav');
  const prevBtn=el('button','qnav-btn');
  prevBtn.textContent='← Prev';
  prevBtn.disabled=qIdx===0;
  prevBtn.addEventListener('click',()=>{qIdx--;explOpen=false;pendingMulti=[];render();});

  const nextBtn=el('button','qnav-btn pri');
  nextBtn.textContent=qIdx===qList.length-1?'Done ✓':'Next →';
  nextBtn.addEventListener('click',()=>{
    if(qIdx<qList.length-1){qIdx++;explOpen=false;pendingMulti=[];render();}
    else{view='list';explOpen=false;pendingMulti=[];render();}
  });

  qnav.appendChild(prevBtn);
  qnav.appendChild(nextBtn);
  app.appendChild(qnav);
}

/* ════════════════════════════════════════════
   ACTIONS
════════════════════════════════════════════ */
function goToQuestion(id,list,fromBookmarks=false){
  qList=list||Q.map(q=>q.id);
  qIdx=qList.indexOf(id);
  if(qIdx<0){qList=Q.map(q=>q.id);qIdx=qList.indexOf(id);}
  view='question';
  viewSource=fromBookmarks?'bookmarks':'practice';
  explOpen=false;
  pendingMulti=[];
  justAnswered=false;
  render();
}

function answerQ(id,selected){
  if(S.answers.hasOwnProperty(id)){
    // In bookmark mode the question is shown fresh regardless of stored state,
    // so allow re-answering by clearing the old answer first.
    if(viewSource!=='bookmarks') return;
    delete S.answers[id];
  }
  const q=getQ(id);
  const sel=Array.isArray(selected)?selected:[selected];
  const correct=[...q.ans].sort().join(',');
  const given=[...sel].map(Number).sort().join(',');
  const isCorrect=correct===given;
  S.answers[id]=sel;
  S.history.push({id,answer:sel,correct:isCorrect,ts:Date.now()});
  // Track retrying for badge display. Wrong → add to retrying; correct → remove.
  const ri=S.retrying.indexOf(id);
  if(isCorrect){ if(ri!==-1) S.retrying.splice(ri,1); }
  else         { if(ri===-1) S.retrying.push(id); }
  save();
  pendingMulti=[];
  justAnswered=true;  // tell renderQuestionView not to auto-retry this render
  render();
}

function retryQ(id){
  delete S.answers[id];
  if(!S.retrying.includes(id)) S.retrying.push(id);
  pendingMulti=[];
  justAnswered=false;
  save();
  render();
}

function toggleBkm(id){
  const i=S.bookmarks.indexOf(id);
  if(i===-1) S.bookmarks.push(id);
  else S.bookmarks.splice(i,1);
  save();
  render();
}

function resetProgress(){
  if(!confirm('Reset all progress? This cannot be undone.')) return;
  S={answers:{},bookmarks:[],history:[],retrying:[]};
  save();
  view='list';filter='all';tab='practice';explOpen=false;
  render();
}

/* ════════════════════════════════════════════
   UTILS
════════════════════════════════════════════ */
function el(tag,cls){
  const e=document.createElement(tag||'div');
  if(cls) e.className=cls;
  return e;
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ════════════════════════════════════════════
   CSV PARSER
════════════════════════════════════════════ */
function parseCSV(text){
  /* RFC-4180 compliant parser — handles quoted fields with embedded commas
     and newlines, which are common in the explanation column. */
  const rows=[];
  let i=0,len=text.length;
  while(i<len){
    const row=[];
    while(i<len){
      let field='';
      if(text[i]==='"'){
        i++;
        while(i<len){
          if(text[i]==='"'){
            if(i+1<len&&text[i+1]==='"'){field+='"';i+=2;}
            else{i++;break;}
          }else{field+=text[i++];}
        }
      }else{
        while(i<len&&text[i]!==','&&text[i]!=='\n'&&text[i]!=='\r')field+=text[i++];
      }
      row.push(field);
      if(i<len&&text[i]===','){i++;continue;}
      break;
    }
    if(i<len&&text[i]==='\r')i++;
    if(i<len&&text[i]==='\n')i++;
    if(row.length>1||(row.length===1&&row[0].trim()))rows.push(row);
  }
  return rows.slice(1).map(r=>{
    // 9-col format (with optE): id,q,A,B,C,D,E,ans,expl
    // 8-col legacy format:      id,q,A,B,C,D,ans,expl
    const hasE=r.length>=9;
    const ansCol=hasE?7:6;
    return {
      id:parseInt(r[0],10)||0,
      q:(r[1]||'').trim(),
      opts:[(r[2]||''),(r[3]||''),(r[4]||''),(r[5]||''),(hasE?(r[6]||''):'')],
      ans:(r[ansCol]||'0').split(',').map(Number),
      expl:(r[ansCol+1]||'').trim()
    };
  }).filter(q=>q.id>0&&q.q);
}

  // Falls back to the splash loader (file:// or CSV not present).
  fetch('questions.csv')
    .then(function(r){if(!r.ok)throw 0;return r.text();})
    .then(function(csv){
      const parsed=parseCSV(csv);
      if(parsed.length){Q=parsed;}  // overwrite the hardcoded demo questions
      render();
    })
    .catch(function(){
      // On file:// or missing CSV: show the splash loader
      showLoader();
    });
}

boot();
</script>
</body>
</html>
